<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <rect width="80" height="100" fill="transparent"/>
  <g stroke="#1a1a1a" stroke-width="2.5" fill="none">
    <!-- Rack frame -->
    <rect x="10" y="20" width="60" height="8" rx="2" fill="#3a2a1a" stroke="#1a1a1a"/>
    <rect x="10" y="70" width="60" height="8" rx="2" fill="#3a2a1a" stroke="#1a1a1a"/>
    <!-- Posts -->
    <rect x="12" y="15" width="8" height="65" fill="#3a2a1a" stroke="#1a1a1a"/>
    <rect x="60" y="15" width="8" height="65" fill="#3a2a1a" stroke="#1a1a1a"/>
    <!-- Swords -->
    <path d="M25,25 L22,10" stroke="#666" stroke-width="3"/>
    <path d="M30,25 L30,8" stroke="#777" stroke-width="2.5"/>
    <path d="M50,22 L55,8" stroke="#666" stroke-width="3"/>
    <path d="M55,25 L60,12" stroke="#777" stroke-width="2.5"/>
    <!-- Crossguards -->
    <line x1="18" y1="25" x2="32" y2="25" stroke="#444" stroke-width="3"/>
    <line x1="45" y1="22" x2="60" y2="22" stroke="#444" stroke-width="3"/>
  </g>
</svg>
