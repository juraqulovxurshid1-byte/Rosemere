<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <rect width="200" height="300" fill="transparent"/>
  <g stroke="#1a1a1a" stroke-width="3" fill="none">
    <!-- Trunk -->
    <path d="M95,160 L90,280 L110,280 L105,160" fill="#3a2a1a" stroke="#1a1a1a"/>
    <path d="M85,200 L70,220" stroke-width="4"/>
    <path d="M115,210 L135,230" stroke-width="4"/>
    <path d="M100,240 L80,250" stroke-width="3"/>
    <!-- Main canopy -->
    <ellipse cx="100" cy="120" rx="75" ry="90" fill="#2a3a20" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Inner canopy detail -->
    <ellipse cx="80" cy="100" rx="40" ry="50" fill="#1e2e15" stroke="none"/>
    <ellipse cx="130" cy="130" rx="35" ry="45" fill="#223a18" stroke="none"/>
    <ellipse cx="100" cy="80" rx="30" ry="35" fill="#1a2a12" stroke="none"/>
    <!-- Branches peeking through -->
    <path d="M50,110 L35,90" stroke-width="4"/>
    <path d="M150,115 L165,95" stroke-width="4"/>
    <path d="M70,70 L55,50" stroke-width="3"/>
    <path d="M130,75 L145,55" stroke-width="3"/>
  </g>
</svg>
