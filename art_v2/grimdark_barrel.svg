<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <rect width="80" height="100" fill="transparent"/>
  <g stroke="#1a1a1a" stroke-width="2.5">
    <!-- Barrel body -->
    <path d="M10,15 Q5,50 10,85 L70,85 Q75,50 70,15 Z" fill="#4a3020" stroke="#1a1a1a"/>
    <!-- Iron bands -->
    <path d="M8,30 Q40,35 72,30" fill="none" stroke="#444" stroke-width="3"/>
    <path d="M8,55 Q40,60 72,55" fill="none" stroke="#444" stroke-width="3"/>
    <path d="M9,42 Q40,47 71,42" fill="none" stroke="#555" stroke-width="2"/>
    <path d="M9,68 Q40,73 71,68" fill="none" stroke="#555" stroke-width="2"/>
    <!-- Wood planks -->
    <line x1="30" y1="15" x2="30" y2="85" stroke="#3a2215" stroke-width="1"/>
    <line x1="50" y1="15" x2="50" y2="85" stroke="#3a2215" stroke-width="1"/>
    <!-- Top rim -->
    <ellipse cx="40" cy="15" rx="30" ry="6" fill="#3a2515" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Bottom rim -->
    <ellipse cx="40" cy="85" rx="30" ry="5" fill="#3a2515" stroke="#1a1a1a" stroke-width="2"/>
  </g>
</svg>
