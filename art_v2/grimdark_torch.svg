<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 160" width="80" height="160">
  <rect width="80" height="160" fill="transparent"/>
  <!-- Flame -->
  <ellipse cx="40" cy="30" rx="12" ry="22" fill="#ff6600" stroke="#222" stroke-width="2.5"/>
  <ellipse cx="40" cy="25" rx="6" ry="14" fill="#ffaa00" stroke="none"/>
  <ellipse cx="40" cy="22" rx="3" ry="8" fill="#ffdd44" stroke="none"/>
  <!-- Sconce bracket -->
  <rect x="30" y="48" width="20" height="6" rx="2" fill="#444" stroke="#222" stroke-width="2"/>
  <!-- Backplate -->
  <rect x="34" y="50" width="12" height="40" rx="2" fill="#333" stroke="#222" stroke-width="2"/>
  <!-- Top spike -->
  <polygon points="40,50 34,50 40,42" fill="#333" stroke="#222" stroke-width="2"/>
</svg>
